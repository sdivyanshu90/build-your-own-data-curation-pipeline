name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: lint • types • tests • coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install package with dev + fast extras
        # 'fast' brings numba so the JIT signature path is exercised/covered.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,fast]"

      - name: Ruff (lint + import order)
        run: ruff check dedup_pipeline tests

      - name: Mypy (strict)
        run: mypy --strict dedup_pipeline

      - name: Pytest + coverage (fail under 90%)
        run: |
          pytest tests/unit tests/integration tests/property_based \
            --cov=dedup_pipeline \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90

      - name: Throughput benchmark (informational, non-gating)
        # Shared CI runners can throttle, so a perf hiccup must not fail the
        # build. The deterministic lint/type/test/coverage steps above are the
        # gate; this step reports throughput and the 5,000 docs/sec floor.
        continue-on-error: true
        run: pytest tests/benchmarks/bench_minhash_throughput.py --benchmark-only

